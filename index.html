<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNX Record - Tenvyx Clan ZingSpeed Mobile</title>
  <meta name="description" content="Kho lưu trữ và bảng xếp hạng kỷ lục tốc độ của Tenvyx Clan (TNX) - ZingSpeed Mobile." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080608;
      --bg-card: rgba(18,10,10,0.75);
      --bg-input: rgba(0,0,0,0.5);
      --border: rgba(255,255,255,0.07);
      --border-active: rgba(220,38,38,0.6);
      --text: #f0f0f5;
      --text-muted: #8b8b9e;
      --text-dim: #4a4a5c;
      --blue: #3b82f6;
      --blue-hover: #60a5fa;
      --purple: #8b5cf6;
      --purple-light: #a78bfa;
      --green: #34d399;
      --red: #dc2626;
      --red-light: #ef4444;
      --red-glow: rgba(220,38,38,0.4);
      --orange: #fb923c;
      --yellow: #fbbf24;
      --radius: 12px;
      --radius-lg: 18px;
      --transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }
    button { cursor:pointer; font-family:inherit; }
    input,textarea,select { font-family:inherit; }

    /* Speed lines BG */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 70% 50% at 10% 20%, rgba(220,38,38,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 90% 80%, rgba(220,38,38,0.05) 0%, transparent 60%),
        radial-gradient(ellipse 80% 30% at 50% 0%, rgba(30,10,10,0.9) 0%, transparent 70%);
    }
    body::after {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image:
        repeating-linear-gradient(105deg, transparent 0px, transparent 80px, rgba(220,38,38,0.018) 80px, rgba(220,38,38,0.018) 81px),
        repeating-linear-gradient(105deg, transparent 0px, transparent 140px, rgba(255,255,255,0.012) 140px, rgba(255,255,255,0.012) 141px);
    }
    #app, .navbar { position:relative; z-index:1; }

        /* Animations */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulseGlow { 0% { box-shadow: 0 0 0 0 var(--red-glow); } 70% { box-shadow: 0 0 0 10px rgba(220,38,38,0); } 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .animate-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .card-hover { transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(220,38,38,0.15); border-color: rgba(220,38,38,0.3); }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideDown { from { opacity:0; transform:scaleY(0.9) translateY(-4px); } to { opacity:1; transform:scaleY(1) translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
    .animate-in { animation:fadeUp 0.45s ease-out; }

    /* NAVBAR */
    .navbar {
      position:sticky; top:0; z-index:100;
      background:rgba(5,5,8,0.85); backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border);
    }
    .navbar-inner {
      max-width:1200px; margin:0 auto; padding:0 24px;
      height:60px; display:flex; align-items:center; justify-content:space-between; gap:20px;
    }
    .logo {
      font-size:1.4rem; font-weight:900; letter-spacing:-0.04em; flex-shrink:0;
      display:flex; align-items:center; gap:8px;
      color:var(--red); font-family:'Rajdhani', sans-serif; text-transform:uppercase;
      text-shadow: 0 0 10px rgba(220,38,38,0.3); transition: transform 0.3s ease;
    }
    .logo:hover { transform: scale(1.05); }
    .nav-links { display:flex; align-items:center; gap:4px; }
    .nav-link {
      padding:6px 12px; border-radius:8px; font-size:0.85rem; font-weight:500;
      color:var(--text-muted); transition:var(--transition);
    }
    .nav-link:hover { color:var(--text); background:rgba(255,255,255,0.05); }
    .nav-link.active { color:var(--text); background:rgba(255,255,255,0.07); }
    .nav-link.admin-link { color:var(--orange); }
    .nav-search {
      flex:1; max-width:280px; display:flex; align-items:center;
      background:var(--bg-input); border:1px solid var(--border); border-radius:8px;
      padding:0 12px; gap:8px;
    }
    .nav-search svg { width:15px; height:15px; color:var(--text-dim); flex-shrink:0; }
    .nav-search input {
      border:none; background:transparent; color:var(--text); font-size:0.85rem;
      width:100%; outline:none; padding:8px 0;
    }
    .nav-search input::placeholder { color:var(--text-dim); }
    #nav-auth { display:flex; align-items:center; gap:8px; flex-shrink:0; }

    /* USER DROPDOWN */
    .user-menu { position:relative; }
    .user-trigger {
      display:flex; align-items:center; gap:8px; padding:5px 10px 5px 5px;
      border-radius:100px; border:1px solid var(--border); background:var(--bg-card);
      cursor:pointer; transition:var(--transition);
    }
    .user-trigger:hover { border-color:rgba(255,255,255,0.15); }
    .user-trigger .uname { font-size:0.8rem; font-weight:600; }
    .user-dropdown {
      position:absolute; top:calc(100% + 8px); right:0; width:200px;
      background:#0d0d18; border:1px solid var(--border); border-radius:var(--radius);
      box-shadow:0 20px 60px rgba(0,0,0,0.6); overflow:hidden;
      animation:slideDown 0.15s ease-out; z-index:200;
    }
    .user-dropdown .dd-item {
      display:flex; align-items:center; gap:10px; padding:10px 14px;
      font-size:0.85rem; color:var(--text-muted); transition:var(--transition);
      cursor:pointer; border:none; background:transparent; width:100%; text-align:left;
    }
    .user-dropdown .dd-item:hover { background:rgba(255,255,255,0.05); color:var(--text); }
    .user-dropdown .dd-item.danger:hover { color:var(--red); background:rgba(248,113,113,0.08); }
    .user-dropdown .dd-sep { height:1px; background:var(--border); margin:4px 0; }

    /* BUTTONS */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:7px;
      padding:9px 18px; border-radius:8px; font-size:0.85rem; font-weight:600;
      border:none; transition:var(--transition); white-space:nowrap; cursor:pointer;
    }
    .btn-primary { background:var(--blue); color:#fff; }
    .btn-primary:hover { background:var(--blue-hover); transform:translateY(-1px); }
    .btn-outline { background:transparent; color:var(--text-muted); border:1px solid var(--border); }
    .btn-outline:hover { background:rgba(255,255,255,0.05); color:var(--text); }
    .btn-danger { background:rgba(248,113,113,0.1); color:var(--red); border:1px solid rgba(248,113,113,0.2); }
    .btn-danger:hover { background:rgba(248,113,113,0.2); }
    .btn-purple { background:var(--purple); color:#fff; }
    .btn-purple:hover { background:var(--purple-light); transform:translateY(-1px); }
    .btn-sm { padding:6px 13px; font-size:0.8rem; }
    .btn-icon { padding:7px; border-radius:7px; background:transparent; border:none; color:var(--text-muted); }
    .btn-icon:hover { color:var(--blue); background:rgba(59,130,246,0.1); }
    .btn:disabled { opacity:0.45; cursor:not-allowed; transform:none !important; }

    /* AVATAR */
    .avatar {
      border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--purple));
      display:flex; align-items:center; justify-content:center;
      font-weight:700; color:#fff; flex-shrink:0; overflow:hidden;
    }
    .avatar-sm { width:28px; height:28px; font-size:0.7rem; }
    .avatar-md { width:36px; height:36px; font-size:0.85rem; }
    .avatar-lg { width:64px; height:64px; font-size:1.4rem; }
    .avatar img { width:100%; height:100%; object-fit:cover; }

    /* CONTAINER */
    .container { max-width:1200px; margin:0 auto; padding:28px 24px; }

    /* CARDS */
    .card {
      background:var(--bg-card); border:1px solid var(--border);
      border-radius:var(--radius); backdrop-filter:blur(12px);
      transition:var(--transition);
    }
    .card-hover:hover { border-color:rgba(139,92,246,0.3); transform:translateY(-3px); box-shadow:0 8px 40px rgba(139,92,246,0.12); }
    .card-body { padding:20px; }
    .card-body-lg { padding:32px; }

    /* FORMS */
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:0.8rem; font-weight:500; color:var(--text-muted); }
    .form-input {
      width:100%; padding:10px 13px; border-radius:8px; font-size:0.85rem;
      background:var(--bg-input); border:1px solid var(--border); color:var(--text);
      transition:var(--transition); outline:none;
    }
    .form-input:focus { border-color:var(--purple); box-shadow:0 0 0 2px rgba(139,92,246,0.15); }
    .form-input::placeholder { color:var(--text-dim); }
    textarea.form-input { min-height:90px; resize:vertical; }

    /* COMBOBOX */
    .combobox { position:relative; }
    .combobox-trigger {
      display:flex; align-items:center; justify-content:space-between;
      width:100%; padding:10px 13px; border-radius:8px; font-size:0.85rem;
      background:var(--bg-input); border:1px solid var(--border); color:var(--text);
      cursor:pointer; transition:var(--transition); gap:8px;
    }
    .combobox-trigger:hover { border-color:rgba(255,255,255,0.15); }
    .combobox-trigger .placeholder { color:var(--text-dim); }
    .combobox-trigger.open { border-color:var(--purple); box-shadow:0 0 0 2px rgba(139,92,246,0.15); }
    .combobox-trigger svg { width:15px; height:15px; opacity:0.4; flex-shrink:0; }
    .combobox-trigger .selected-text { flex:1; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .combobox-dropdown {
      position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:50;
      border-radius:10px; border:1px solid var(--border);
      background:#0a0a14; box-shadow:0 12px 40px rgba(0,0,0,0.6);
      animation:slideDown 0.12s ease-out; overflow:hidden;
    }
    .combobox-search { padding:8px; border-bottom:1px solid var(--border); }
    .combobox-search input {
      width:100%; padding:7px 11px; border-radius:7px; font-size:0.82rem;
      background:rgba(0,0,0,0.4); border:1px solid var(--border); color:var(--text); outline:none;
    }
    .combobox-search input:focus { border-color:var(--purple); }
    .combobox-list { max-height:200px; overflow-y:auto; padding:4px; }
    .combobox-item {
      display:flex; align-items:center; gap:8px; padding:8px 11px;
      border-radius:7px; font-size:0.83rem; cursor:pointer; transition:background 0.12s;
    }
    .combobox-item:hover { background:rgba(255,255,255,0.06); }
    .combobox-item.selected { background:rgba(139,92,246,0.12); color:var(--purple-light); }
    .combobox-check { width:15px; height:15px; opacity:0; flex-shrink:0; }
    .combobox-item.selected .combobox-check { opacity:1; }
    .combobox-empty { padding:20px; text-align:center; color:var(--text-dim); font-size:0.82rem; }
    .combobox-clear {
      display:flex; align-items:center; gap:8px; padding:7px 11px;
      border-radius:7px; font-size:0.82rem; cursor:pointer; width:100%;
      color:var(--text-dim); border:none; background:transparent; text-align:left;
      border-bottom:1px solid var(--border); margin-bottom:2px;
    }
    .combobox-clear:hover { color:var(--red); background:rgba(248,113,113,0.06); }
    .combobox-group-header {
      padding:4px 11px 2px;
      font-size:0.7rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
      color:var(--text-dim); background:rgba(255,255,255,0.03);
      border-bottom:1px solid var(--border); margin-top:4px;
    }

    /* TABLE */
    .data-table { width:100%; border-collapse:collapse; }
    .data-table th {
      padding:11px 16px; text-align:left; font-size:0.75rem; font-weight:600;
      color:var(--text-dim); text-transform:uppercase; letter-spacing:0.07em;
      background:rgba(0,0,0,0.3); border-bottom:1px solid var(--border);
    }
    .data-table th:first-child { border-radius:0; }
    .data-table td {
      padding:12px 16px; border-bottom:1px solid rgba(255,255,255,0.025);
      font-size:0.85rem; vertical-align:middle;
    }
    .data-table tr:hover td { background:rgba(255,255,255,0.015); }
    .data-table tr:last-child td { border-bottom:none; }

    /* BADGE */
    .badge {
      display:inline-flex; padding:3px 10px; border-radius:100px;
      font-size:0.72rem; font-weight:600; border:1px solid; letter-spacing:0.02em;
    }
    .badge-blue { background:rgba(59,130,246,0.1); color:#93c5fd; border-color:rgba(59,130,246,0.2); }
    .badge-purple { background:rgba(139,92,246,0.1); color:#c4b5fd; border-color:rgba(139,92,246,0.2); }
    .badge-orange { background:rgba(251,146,60,0.1); color:#fdba74; border-color:rgba(251,146,60,0.2); }
    .badge-green { background:rgba(52,211,153,0.1); color:#6ee7b7; border-color:rgba(52,211,153,0.2); }

    /* SKELETON */
    .skeleton {
      background:linear-gradient(90deg, rgba(255,255,255,0.02) 25%, rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.02) 75%);
      background-size:200% 100%; animation:shimmer 1.5s infinite; border-radius:8px;
    }

    /* RANK */
    .rank-badge {
      display:inline-flex; align-items:center; justify-content:center;
      width:30px; height:30px; border-radius:50%; font-weight:700; font-size:0.82rem;
    }
    .rank-1 { background:rgba(251,191,36,0.15); color:var(--yellow); border:1px solid rgba(251,191,36,0.4); box-shadow:0 0 12px rgba(251,191,36,0.25); }
    .rank-2 { background:rgba(203,213,225,0.12); color:#cbd5e1; border:1px solid rgba(203,213,225,0.3); }
    .rank-3 { background:rgba(251,146,60,0.12); color:var(--orange); border:1px solid rgba(251,146,60,0.3); }

    /* RECORD TIME */
    .record-time { font-family:'JetBrains Mono','Fira Code','Courier New',monospace; font-weight:700; color:var(--green); }
    .record-time-xl { font-size:2.8rem; line-height:1; }

    /* HERO */
    .hero {
      text-align:center; padding:80px 24px 72px;
      background:linear-gradient(135deg, rgba(15,15,35,0.6), rgba(20,10,40,0.6));
      border-radius:24px; border:1px solid var(--border);
      position:relative; overflow:hidden;
    }
    .hero::before {
      content:''; position:absolute; inset:0; pointer-events:none;
      background: radial-gradient(ellipse 70% 60% at 50% -20%, rgba(139,92,246,0.12) 0%, transparent 70%);
    }
    .hero-content { position:relative; z-index:1; }
    .hero h1 { font-size:clamp(2.2rem,6vw,3.8rem); font-weight:900; letter-spacing:-0.04em; line-height:1.1; }
    .hero .grad {
      background:linear-gradient(135deg, var(--red-light), var(--red), #fca5a5);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
      font-family:'Rajdhani', sans-serif; text-transform:uppercase;
    }
    .hero p { font-size:1.05rem; color:var(--text-muted); max-width:500px; margin:18px auto 0; }
    .hero-actions { display:flex; justify-content:center; gap:10px; margin-top:28px; flex-wrap:wrap; }
    .hero-stats { display:flex; justify-content:center; gap:32px; margin-top:40px; padding-top:32px; border-top:1px solid var(--border); }
    .hero-stat .val { font-size:1.8rem; font-weight:900; color:var(--text); }
    .hero-stat .lbl { font-size:0.78rem; color:var(--text-dim); font-weight:500; margin-top:2px; }

    /* VIDEO GRID */
    .video-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(270px,1fr)); gap:16px; }
    .video-card { display:flex; flex-direction:column; }
    .video-card .thumb {
      position:relative; aspect-ratio:16/9; overflow:hidden; background:#080810; flex-shrink:0;
      border-radius:var(--radius) var(--radius) 0 0;
    }
    .video-card .thumb img { width:100%; height:100%; object-fit:cover; opacity:0.75; transition:var(--transition); }
    .video-card:hover .thumb img { opacity:1; transform:scale(1.06); }
    .video-card .thumb .overlay { position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.75) 0%, transparent 50%); }
    .video-card .thumb .time-badge {
      position:absolute; bottom:8px; right:8px;
      background:rgba(0,0,0,0.75); backdrop-filter:blur(8px);
      padding:3px 8px; border-radius:5px; font-size:0.75rem; font-weight:700;
      color:var(--green); font-family:monospace; border:1px solid rgba(52,211,153,0.2);
    }
    .video-card .thumb .play-btn {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:44px; height:44px; border-radius:50%;
      background:rgba(255,255,255,0.9); display:flex; align-items:center; justify-content:center;
      opacity:0; transition:opacity 0.2s; color:#111;
    }
    .video-card:hover .thumb .play-btn { opacity:1; }
    .video-card .info { padding:14px 16px; flex:1; }
    .video-card .info .title { font-size:0.9rem; font-weight:700; margin-bottom:5px; }
    .video-card .meta { font-size:0.78rem; color:var(--text-muted); display:flex; flex-direction:column; gap:2px; }
    .video-card .stats {
      display:flex; justify-content:space-between; align-items:center;
      padding-top:10px; margin-top:10px; border-top:1px solid var(--border);
      font-size:0.73rem; color:var(--text-dim);
    }
    .video-card .stats-left { display:flex; gap:10px; }

    /* SECTION */
    .section-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; }
    .section-header h2 { font-size:1.5rem; font-weight:800; letter-spacing:-0.03em; }

    /* AUTH */
    .auth-wrap { display:flex; align-items:center; justify-content:center; min-height:72vh; }
    .auth-card { width:100%; max-width:400px; }
    .auth-title { font-size:1.6rem; font-weight:800; text-align:center; margin-bottom:4px; }
    .auth-desc { font-size:0.83rem; color:var(--text-muted); text-align:center; margin-bottom:22px; }
    .auth-foot { text-align:center; margin-top:14px; font-size:0.82rem; color:var(--text-muted); }
    .auth-foot a { color:var(--purple-light); }

    /* FILTER BAR */
    .filter-bar {
      background:var(--bg-card); padding:20px 24px; border-radius:var(--radius-lg);
      border:1px solid var(--border); backdrop-filter:blur(10px);
    }
    .filter-bar h2 { font-size:0.85rem; font-weight:600; color:var(--text-muted); margin-bottom:14px; text-transform:uppercase; letter-spacing:0.05em; }
    .filter-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:14px; }

    /* VIDEO DETAIL */
    .video-player { width:100%; aspect-ratio:16/9; border-radius:20px; overflow:hidden; background:#000; border:1px solid var(--border); }
    .video-player iframe, .video-player video { width:100%; height:100%; border:0; }
    .detail-grid { display:grid; grid-template-columns:1fr 340px; gap:28px; margin-top:24px; }
    .info-bar {
      display:flex; flex-wrap:wrap; align-items:center; gap:16px;
      background:var(--bg-card); padding:14px 18px; border-radius:var(--radius);
      border:1px solid var(--border);
    }
    .info-bar-sep { width:1px; height:28px; background:var(--border); }
    .info-stat { display:flex; align-items:center; gap:6px; font-size:0.82rem; color:var(--text-muted); }
    .stat-card {
      background:linear-gradient(145deg,rgba(20,15,45,0.8),rgba(10,8,22,0.9));
      border:1px solid var(--border); border-radius:var(--radius); padding:22px;
    }
    .stat-row { display:flex; justify-content:space-between; align-items:center; padding:9px 0; border-bottom:1px solid rgba(255,255,255,0.04); }
    .stat-row:last-child { border-bottom:none; padding-bottom:0; }
    .stat-label { display:flex; align-items:center; gap:8px; font-size:0.83rem; color:var(--text-muted); }

    /* TABS */
    .tabs { display:flex; gap:3px; background:rgba(0,0,0,0.4); padding:4px; border-radius:10px; border:1px solid var(--border); display:inline-flex; }
    .tab-btn {
      padding:7px 18px; border-radius:8px; border:none; background:transparent;
      color:var(--text-muted); font-size:0.83rem; font-weight:500; transition:var(--transition);
    }
    .tab-btn.active { background:var(--purple); color:#fff; box-shadow:0 2px 12px rgba(139,92,246,0.3); }
    .tab-btn:hover:not(.active) { color:var(--text); }

    /* TOAST */
    .toasts { position:fixed; bottom:20px; right:20px; z-index:999; display:flex; flex-direction:column; gap:8px; pointer-events:none; }
    .toast {
      padding:11px 18px; border-radius:10px; font-size:0.82rem; font-weight:500;
      backdrop-filter:blur(16px); border:1px solid; min-width:240px;
      animation:fadeUp 0.25s ease-out; pointer-events:all; transition:opacity 0.25s;
    }
    .toast-success { background:rgba(52,211,153,0.1); color:var(--green); border-color:rgba(52,211,153,0.25); }
    .toast-error { background:rgba(248,113,113,0.1); color:var(--red); border-color:rgba(248,113,113,0.25); }
    .toast-info { background:rgba(59,130,246,0.1); color:var(--blue-hover); border-color:rgba(59,130,246,0.25); }

    /* EMPTY */
    .empty { text-align:center; padding:56px 24px; color:var(--text-dim); border-radius:var(--radius); border:1px solid var(--border); background:var(--bg-card); }
    .empty-icon { font-size:2.5rem; margin-bottom:12px; opacity:0.5; }

    /* PROFILE */
    .profile-header {
      display:flex; align-items:center; gap:20px; padding:28px 32px;
      background:linear-gradient(135deg,rgba(15,15,35,0.8),rgba(10,5,25,0.9));
      border-radius:var(--radius-lg); border:1px solid var(--border);
    }
    .profile-info h2 { font-size:1.5rem; font-weight:800; }
    .profile-info p { font-size:0.85rem; color:var(--text-muted); margin-top:4px; }
    .profile-stats { display:flex; gap:24px; margin-top:14px; }
    .profile-stat .val { font-size:1.4rem; font-weight:800; color:var(--text); }
    .profile-stat .lbl { font-size:0.75rem; color:var(--text-dim); }

    /* SPINNER */
    .spinner {
      display:inline-block; width:18px; height:18px; border-radius:50%;
      border:2px solid rgba(255,255,255,0.1); border-top-color:var(--blue);
      animation:spin 0.7s linear infinite;
    }

    /* ADMIN */
    .admin-add-form { display:flex; gap:10px; flex-wrap:wrap; align-items:flex-end; margin-top:14px; }
    .admin-add-form .form-group { flex:1; min-width:140px; }

    /* MODAL */
    .modal-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
      z-index:300; display:flex; align-items:center; justify-content:center; padding:20px;
      animation:fadeUp 0.2s ease-out;
    }
    .modal {
      background:#0d0d18; border:1px solid var(--border); border-radius:var(--radius-lg);
      padding:28px; width:100%; max-width:400px; box-shadow:0 25px 80px rgba(0,0,0,0.7);
    }
    .modal h3 { font-size:1.1rem; font-weight:700; margin-bottom:8px; }
    .modal p { font-size:0.85rem; color:var(--text-muted); margin-bottom:20px; }
    .modal-actions { display:flex; gap:10px; justify-content:flex-end; }

    /* RESPONSIVE */
    @media (max-width:768px) {
      .detail-grid { grid-template-columns:1fr; }
      .hero-stats { gap:20px; }
      .hero h1 { font-size:2rem; }
      .nav-search { display:none; }
      .profile-header { flex-direction:column; align-items:flex-start; }
    }
    @media (max-width:480px) {
      .video-grid { grid-template-columns:1fr; }
      .filter-grid { grid-template-columns:1fr; }
      .navbar-inner { padding:0 14px; }
      .container { padding:20px 14px; }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="#/" class="logo"><img src="Logo-clan.jpg" alt="TNX" style="height:32px; width:auto; border-radius:4px; object-fit:contain;"/> TNX Record</a>
    <div class="nav-links">
      <a href="#/" class="nav-link" data-route="/">Trang chủ</a>
      <a href="#/board" class="nav-link" data-route="/board">Bảng Xếp Hạng</a>
    </div>
    <div class="nav-search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="global-search" placeholder="Tìm kiếm record..." oninput="onSearchInput(this.value)" autocomplete="off" />
    </div>
    <div id="nav-auth"></div>
  </div>
</nav>

<div class="container" id="app">
  <div style="display:flex;align-items:center;justify-content:center;height:50vh;">
    <div class="spinner" style="width:32px;height:32px;border-width:3px;"></div>
  </div>
</div>

<!-- SEARCH RESULTS DROPDOWN -->
<div id="search-results" style="display:none;position:fixed;top:64px;left:50%;transform:translateX(-50%);width:min(600px,90vw);background:#0a0a14;border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 20px 60px rgba(0,0,0,0.6);z-index:200;overflow:hidden;max-height:400px;overflow-y:auto;"></div>

<div class="toasts" id="toasts"></div>

<script>
const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
  ? 'http://localhost:8001/api/v1' 
  : 'https://zsm-record-backend.onrender.com/api/v1';

// ─── STATE ───────────────────────────────────────────
let currentUser = null;
let searchTimeout = null;

// ─── UTILS ───────────────────────────────────────────
const $ = id => document.getElementById(id);
const esc = str => { if(!str) return ''; const d=document.createElement('div'); d.textContent=str; return d.innerHTML; };

function fmtMs(ms) {
  const m=Math.floor(ms/60000), s=Math.floor((ms%60000)/1000), mi=ms%1000;
  return `${m}:${String(s).padStart(2,'0')}.${String(mi).padStart(3,'0')}`;
}
function parseRecord(str) {
  const [m,rest]=str.split(':'); const [s,mi]=rest.split('.');
  return parseInt(m)*60000+parseInt(s)*1000+parseInt(mi.padEnd(3,'0'));
}
function dateStr(d) { return new Date(d).toLocaleDateString('vi-VN'); }
function getToken() { return localStorage.getItem('zsm_token'); }
function setToken(t) { localStorage.setItem('zsm_token',t); }
function clearToken() { localStorage.removeItem('zsm_token'); }

// ─── API ─────────────────────────────────────────────
async function apiFetch(path, opts={}) {
  const h={'Content-Type':'application/json',...(opts.headers||{})};
  if(getToken()) h['Authorization']=`Bearer ${getToken()}`;
  const res = await fetch(`${API}${path}`,{...opts,headers:h});
  if(!res.ok) { const e=await res.json().catch(()=>({detail:'Lỗi kết nối'})); throw new Error(e.detail||'Yêu cầu thất bại'); }
  return res.json();
}

async function fetchUser() {
  try { if(!getToken()){currentUser=null;return;} currentUser=await apiFetch('/auth/me'); }
  catch { currentUser=null; clearToken(); }
}

// ─── TOAST ───────────────────────────────────────────
function toast(msg, type='success') {
  const c=$('toasts'), t=document.createElement('div');
  t.className=`toast toast-${type}`; t.textContent=msg; c.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';setTimeout(()=>t.remove(),300)},3000);
}

// ─── NAV ─────────────────────────────────────────────
function renderNav() {
  const el=$('nav-auth');
  // Update active link
  const hash=window.location.hash.slice(1)||'/';
  document.querySelectorAll('[data-route]').forEach(l => l.classList.toggle('active', l.dataset.route===hash));
  if(currentUser) {
    el.innerHTML=`
      <a href="#/upload" class="btn btn-purple btn-sm">+ Đăng Record</a>
      <div class="user-menu" id="user-menu">
        <button class="user-trigger" onclick="toggleUserMenu()">
          ${currentUser.avatar 
            ? `<img src="${esc(currentUser.avatar)}" class="avatar avatar-sm" style="object-fit:cover;"/>` 
            : `<span class="avatar avatar-sm">${esc(currentUser.username[0].toUpperCase())}</span>`
          }
          <span class="uname">${esc(currentUser.username)}</span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
      </div>`;
  } else {
    el.innerHTML=`
      <a href="#/login" class="btn btn-outline btn-sm">Đăng nhập</a>
      <a href="#/register" class="btn btn-primary btn-sm">Đăng ký</a>`;
  }
}

function toggleUserMenu() {
  const menu=$('user-menu'); if(!menu) return;
  const existing=menu.querySelector('.user-dropdown');
  if(existing) { existing.remove(); return; }
  const dd=document.createElement('div');
  dd.className='user-dropdown';
  dd.innerHTML=`
    <button class="dd-item" onclick="navigate('/profile/'+currentUser.id);closeMenu()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Hồ sơ của tôi
    </button>
    ${currentUser.role==='ADMIN'?`<button class="dd-item" onclick="navigate('/admin');closeMenu()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      Trang Quản Trị
    </button>`:''}
    <div class="dd-sep"></div>
    <button class="dd-item danger" onclick="logout()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Đăng xuất
    </button>`;
  menu.appendChild(dd);
}

function closeMenu() { const d=document.querySelector('.user-dropdown'); if(d) d.remove(); }
document.addEventListener('click',e=>{ if(!e.target.closest('.user-menu')) closeMenu(); });
function logout() { clearToken(); currentUser=null; renderNav(); toast('Đã đăng xuất'); navigate('/'); }
function navigate(p) { window.location.hash=p; }

// ─── COMBOBOX ─────────────────────────────────────────
// opts = [{label, value, group?}] — group is optional, used for car class grouping
function mkCombobox(id, opts, placeholder, val='') {
  const sel=opts.find(o=>o.value===val);
  // Build items with optional group headers
  let itemsHtml = '';
  let lastGroup = null;
  for (const o of opts) {
    const g = o.group || null;
    if (g && g !== lastGroup) {
      itemsHtml += `<div class="combobox-group-header">${esc(g)}</div>`;
      lastGroup = g;
    }
    itemsHtml += `<div class="combobox-item${o.value===val?' selected':''}" data-value="${o.value}" data-label="${esc(o.label.trim())}" data-group="${esc(g||'')}" onclick="pickCB('${id}','${o.value}','${esc(o.label.trim())}')" tabindex="0">
      <svg class="combobox-check" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
      ${esc(o.label.trim())}</div>`;
  }
  return `<div class="combobox" id="cb-${id}">
    <button type="button" class="combobox-trigger${!val?' placeholder':''}"
      onclick="openCB('${id}')" id="cbt-${id}">
      <span class="selected-text ${!val?'placeholder':''}">${sel?esc(sel.label):placeholder}</span>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 10l5 5 5-5"/></svg>
    </button>
    <div class="combobox-dropdown" style="display:none" id="cbd-${id}">
      <div class="combobox-search"><input placeholder="Tìm kiếm..." oninput="filterCB('${id}',this.value)" autocomplete="off" /></div>
      <div class="combobox-list" id="cbl-${id}">
        <button type="button" class="combobox-clear" onclick="clearCB('${id}','${placeholder}')">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg> Bỏ chọn
        </button>
        ${itemsHtml}
        ${!opts.length?'<div class="combobox-empty">Không có dữ liệu</div>':''}
      </div>
    </div>
  </div>`;
}

function openCB(id) {
  document.querySelectorAll('.combobox-dropdown').forEach(d=>{if(d.id!==`cbd-${id}`)d.style.display='none';});
  const dd=$(`cbd-${id}`); const isOpen=dd.style.display!=='none';
  dd.style.display=isOpen?'none':'block';
  $(`cbt-${id}`)?.classList.toggle('open',!isOpen);
  if(!isOpen) { const inp=dd.querySelector('input'); inp?.focus(); inp&&(inp.value=''); filterCB(id,''); }
}
function filterCB(id,q) {
  const list = document.getElementById(`cbl-${id}`);
  if (!list) return;
  const items = list.querySelectorAll('.combobox-item');
  const headers = list.querySelectorAll('.combobox-group-header');
  const lq = q.toLowerCase();
  items.forEach(i => {
    i.style.display = i.dataset.label.toLowerCase().includes(lq) ? '' : 'none';
  });
  // Hide group headers if all items in that group are hidden
  headers.forEach(h => {
    let next = h.nextElementSibling;
    let hasVisible = false;
    while (next && !next.classList.contains('combobox-group-header')) {
      if (next.classList.contains('combobox-item') && next.style.display !== 'none') hasVisible = true;
      next = next.nextElementSibling;
    }
    h.style.display = hasVisible ? '' : 'none';
  });
}
function pickCB(id,val,label) {
  const cb=$(`cb-${id}`); const t=$(`cbt-${id}`);
  const txt=t.querySelector('.selected-text'); txt.textContent=label; txt.classList.remove('placeholder');
  cb.dataset.value=val;
  document.querySelectorAll(`#cbl-${id} .combobox-item`).forEach(i=>i.classList.toggle('selected',i.dataset.value===val));
  $(`cbd-${id}`).style.display='none'; t.classList.remove('open');
}
function clearCB(id, placeholder) {
  const cb=$(`cb-${id}`); const t=$(`cbt-${id}`);
  const txt=t.querySelector('.selected-text'); txt.textContent=placeholder; txt.classList.add('placeholder');
  cb.dataset.value='';
  document.querySelectorAll(`#cbl-${id} .combobox-item`).forEach(i=>i.classList.remove('selected'));
  $(`cbd-${id}`).style.display='none'; t.classList.remove('open');
}
document.addEventListener('click',e=>{
  if(!e.target.closest('.combobox')) {
    document.querySelectorAll('.combobox-dropdown').forEach(d=>d.style.display='none');
    document.querySelectorAll('.combobox-trigger.open').forEach(t=>t.classList.remove('open'));
  }
});

// ─── SKELETON ─────────────────────────────────────────
const skCards=n=>Array(n).fill('').map(()=>`<div class="card"><div class="skeleton" style="aspect-ratio:16/9;border-radius:var(--radius) var(--radius) 0 0"></div><div class="card-body"><div class="skeleton" style="height:15px;width:55%;margin-bottom:7px"></div><div class="skeleton" style="height:12px;width:38%"></div></div></div>`).join('');
const skRows=n=>Array(n).fill('').map(()=>`<tr>${Array(6).fill('').map(()=>'<td><div class="skeleton" style="height:18px"></div></td>').join('')}</tr>`).join('');

// ─── GLOBAL SEARCH ────────────────────────────────────
async function onSearchInput(q) {
  const sr=$('search-results'); if(!q.trim()){ sr.style.display='none'; return; }
  clearTimeout(searchTimeout);
  searchTimeout=setTimeout(async()=>{
    try {
      const res=await apiFetch(`/videos?limit=6`);
      const fil=res.filter(v=>
        v.map?.name?.toLowerCase().includes(q.toLowerCase())||
        v.car?.name?.toLowerCase().includes(q.toLowerCase())||
        v.user?.username?.toLowerCase().includes(q.toLowerCase())
      );
      if(!fil.length){ sr.innerHTML='<div style="padding:16px;text-align:center;color:var(--text-dim);font-size:0.83rem">Không tìm thấy kết quả</div>'; }
      else {
        sr.innerHTML=fil.map(v=>`
          <a href="#/video/${v.id}" onclick="$('search-results').style.display='none';$('global-search').value=''"
            style="display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border);transition:background 0.15s;"
            onmouseover="this.style.background='rgba(255,255,255,0.04)'" onmouseout="this.style.background=''">
            <span class="record-time" style="font-size:0.9rem;white-space:nowrap">${fmtMs(v.record_ms)}</span>
            <div style="flex:1;overflow:hidden">
              <div style="font-size:0.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(v.map?.name)} - ${esc(v.car?.name)}</div>
              <div style="font-size:0.75rem;color:var(--text-dim)">${esc(v.user?.username)}</div>
            </div>
          </a>`).join('');
      }
      sr.style.display='block';
    } catch {}
  }, 300);
}
document.addEventListener('click',e=>{if(!e.target.closest('#global-search')&&!e.target.closest('#search-results'))$('search-results').style.display='none';});

// ─── DELETE CONFIRM MODAL ─────────────────────────────
function confirmDelete(videoId, title) {
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal">
    <h3>Xóa Record</h3>
    <p>Bạn có chắc chắn muốn xóa "<strong>${esc(title)}</strong>"? Hành động này không thể hoàn tác.</p>
    <div class="modal-actions">
      <button class="btn btn-outline btn-sm" onclick="this.closest('.modal-overlay').remove()">Hủy</button>
      <button class="btn btn-danger btn-sm" onclick="doDelete('${videoId}',this.closest('.modal-overlay'))">Xóa</button>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}
async function doDelete(id, overlay) {
  try {
    await apiFetch(`/videos/${id}`,{method:'DELETE'});
    overlay.remove(); toast('Đã xóa record thành công!'); navigate('/');
  } catch(e) { toast(e.message,'error'); }
}

// ════════════════════════════════════════════════════
//                       PAGES
// ════════════════════════════════════════════════════

// ── HOME ──────────────────────────────────────────────
async function renderHome() {
  $('app').innerHTML=`<div class="animate-in" style="display:flex;flex-direction:column;gap:36px;">
    <section class="hero"><div class="hero-content">
      <h1 class="animate-up">Kho Dữ Liệu Tốc Độ<br><span class="grad" style="font-size:1.1em;">TENVYX CLAN (TNX)</span></h1>
      <p class="animate-up delay-1" style="color:var(--text-muted);font-size:1.1rem;line-height:1.6;">Lưu trữ, vinh danh kỷ lục và chia sẻ kỹ năng của các tay đua xuất sắc nhất thuộc Tenvyx Clan.</p>
      <div class="hero-actions animate-up delay-2">
        <a href="#/board" class="btn btn-purple" style="padding:12px 28px">&#127942; Bảng Xếp Hạng</a>
        <a href="#/upload" class="btn btn-outline" style="padding:12px 28px">&#9650; Đăng Record</a>
      </div>
      <div class="hero-stats animate-up delay-3" id="hero-stats">
        <div class="hero-stat"><div class="skeleton" style="height:28px;width:50px;margin-bottom:4px"></div><div class="skeleton" style="height:12px;width:50px"></div></div>
        <div class="hero-stat"><div class="skeleton" style="height:28px;width:50px;margin-bottom:4px"></div><div class="skeleton" style="height:12px;width:50px"></div></div>
        <div class="hero-stat"><div class="skeleton" style="height:28px;width:50px;margin-bottom:4px"></div><div class="skeleton" style="height:12px;width:50px"></div></div>
      </div>
    </div></section>
    <section>
      <div class="section-header">
        <h2>Record Mới Nhất</h2>
        <a href="#/board" style="font-size:0.83rem;color:var(--purple-light)">Xem tất cả &rarr;</a>
      </div>
      <div class="video-grid" id="home-grid">${skCards(8)}</div>
    </section>
  </div>`;

  try {
    const [videos, maps, cars] = await Promise.all([
      apiFetch('/videos?limit=8'), apiFetch('/maps'), apiFetch('/cars')
    ]);
    $('hero-stats').innerHTML=`
      <div class="hero-stat"><div class="val">${videos.length < 8 ? videos.length : '8+'}</div><div class="lbl">Số Record</div></div>
      <div class="hero-stat"><div class="val">${maps.length}</div><div class="lbl">Bản Đồ</div></div>
      <div class="hero-stat"><div class="val">${cars.length}</div><div class="lbl">Siêu Xe</div></div>`;
    $('home-grid').innerHTML = videos.length
      ? videos.map(videoCard).join('')
      : '<div class="empty"><div class="empty-icon">&#128263;</div><p>Chưa có record nào. Hãy là người đầu tiên tải lên!</p></div>';
  } catch { $('home-grid').innerHTML='<div class="empty" style="color:var(--red)">Tải dữ liệu thất bại. Bạn đã chạy backend chưa?</div>'; }
}

function videoCard(v) {
  const img=v.map?.image||`https://placehold.co/600x338/0d0d22/fff?text=${encodeURIComponent(v.map?.name||'Map')}`;
  return `<a href="#/video/${v.id}" class="card card-hover video-card">
    <div class="thumb">
      <img src="${esc(img)}" alt="${esc(v.map?.name)}" loading="lazy"/>
      <div class="overlay"></div>
      <div class="time-badge">${fmtMs(v.record_ms)}</div>
      <div class="play-btn"><svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
    </div>
    <div class="info">
      <div class="title">${esc(v.map?.name)}</div>
      <div class="meta">
        <span>&#128663; ${esc(v.car?.name)}</span>
        <span>&#128100; ${esc(v.user?.username)}</span>
      </div>
      <div class="stats">
        <div class="stats-left"><span>&#128065; ${v.views||0}</span><span>&#128077; ${v.likes||0}</span></div>
        <span>${dateStr(v.created_at)}</span>
      </div>
    </div>
  </a>`;
}

// ── LOGIN ─────────────────────────────────────────────
function renderLogin() {
  $('app').innerHTML=`<div class="auth-wrap animate-in"><div class="auth-card card"><div class="card-body-lg">
    <h1 class="auth-title">&#128274; Đăng nhập</h1>

async function loadBoard() {
  const body=$('board-body'); if(!body) return;
  body.innerHTML=skRows(5);
  const params=new URLSearchParams();
  const m=$('cb-bmap')?.dataset.value, c=$('cb-bcar')?.dataset.value, p=$('cb-bpet')?.dataset.value;
  if(m) params.append('map_id',m); if(c) params.append('car_id',c); if(p) params.append('pet_id',p);
  try {
    const board=await apiFetch(`/record-board?${params}`);
    if(!board.length){ body.innerHTML='<tr><td colspan="6"><div class="empty">Chưa có dữ liệu cho bộ lọc này.</div></td></tr>'; return; }
    body.innerHTML=board.map(e=>`<tr>
      <td style="text-align:center">${e.rank<=3?`<span class="rank-badge rank-${e.rank}">${e.rank}</span>`:`<span style="color:var(--text-dim);font-family:monospace;font-size:0.85rem">${e.rank}</span>`}</td>

      <td><span class="badge badge-blue">${esc(e.car.name)}</span></td>
      <td>${e.pet?.name&&e.pet.name!=='None'?`<span class="badge badge-purple">${esc(e.pet.name)}</span>`:'<span style="color:var(--text-dim)">—</span>'}</td>
      <td><span class="record-time" style="font-size:1.05rem">${fmtMs(e.record_ms)}</span></td>
      <td style="text-align:right"><a href="#/video/${e.video_id}" class="btn-icon" title="Watch">&#9654;</a></td>
    </tr>`).join('');
  } catch { body.innerHTML='<tr><td colspan="6" style="text-align:center;padding:32px;color:var(--red)">Tải bảng xếp hạng thất bại.</td></tr>'; }
}

window.editProfile = async function(field) {
  if (field === 'avatar') {
    const file = document.createElement('input');
    file.type = 'file'; file.accept = 'image/*';
    file.onchange = async e => {
      const f = e.target.files[0];
      if(!f) return;
      const b = $('avatar-edit-btn');
      b.innerHTML = '<span class="spinner" style="width:12px;height:12px"></span>';
      const fd = new FormData(); fd.append('avatar_file', f);
      try {
        const r = await fetch(`${API}/users/me/avatar`, {
          method: 'POST',
          headers: {'Authorization': `Bearer ${getToken()}`},
          body: fd
        });
        if(!r.ok) throw new Error((await r.json()).detail || 'Lỗi cập nhật avatar');
        toast('Cập nhật Avatar thành công!');
        await fetchUser(); renderProfile(currentUser.id); renderNav();
      } catch(err) { toast(err.message, 'error'); b.innerHTML = 'Đổi ảnh'; }
    };
    file.click();
  } else if (field === 'username') {
    const newName = prompt('Nhập tên người dùng mới (Tối thiểu 3 ký tự):', currentUser.username);
    if (!newName || newName === currentUser.username) return;
    try {
      const r = await fetch(`${API}/users/me/username`, {
        method: 'PUT',
        headers: {'Content-Type': 'application/json', 'Authorization': `Bearer ${getToken()}`},
        body: JSON.stringify({username: newName})
      });
      if(!r.ok) throw new Error((await r.json()).detail || 'Lỗi cập nhật tên');
      toast('Cập nhật tên thành công!');
      await fetchUser(); renderProfile(currentUser.id); renderNav();
    } catch(err) { toast(err.message, 'error'); }
  }
};

async function renderProfile(userId) {
  $('app').innerHTML=`<div class="animate-in"><div class="skeleton" style="height:130px;border-radius:var(--radius-lg);margin-bottom:24px"></div><div class="video-grid">${skCards(6)}</div></div>`;
  try {
    const [videos, user] = await Promise.all([
      apiFetch(`/videos?user_id=${userId}&limit=50`),
      apiFetch(`/users/${userId}`)
    ]);
    const totalMs = videos.reduce((a,v) => a+(v.record_ms||0), 0);
    const isOwner = currentUser?.id === userId;
    
    // Calculate cooldowns
    let avatarWait = '', nameWait = '';
    if (isOwner) {
      const now = new Date();
      if (currentUser.last_avatar_update) {
        const d = new Date(currentUser.last_avatar_update + 'Z');
        const diff = now - d;
        if (diff < 86400000) avatarWait = `(Chờ ${Math.ceil((86400000-diff)/3600000)}h)`;
      }
      if (currentUser.last_username_update) {
        const d = new Date(currentUser.last_username_update + 'Z');
        const diff = now - d;
        if (diff < 7*86400000) nameWait = `(Chờ ${Math.ceil((7*86400000-diff)/86400000)} ngày)`;
      }
    }

    $('app').innerHTML=`<div class="animate-in" style="display:flex;flex-direction:column;gap:24px;">
      <div class="profile-header">
        <div style="position:relative; display:inline-block;">
          ${user.avatar 
            ? `<img src="${esc(user.avatar)}" class="avatar avatar-lg" style="object-fit:cover; border:2px solid var(--border);" />` 
            : `<span class="avatar avatar-lg">${esc(user.username[0].toUpperCase())}</span>`
          }
          ${isOwner ? `<button id="avatar-edit-btn" onclick="editProfile('avatar')" class="btn btn-sm" style="position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border);font-size:0.7rem;padding:4px 8px;white-space:nowrap;">Đổi ảnh ${avatarWait}</button>` : ''}
        </div>
        <div class="profile-info">
          <h2 style="display:flex;align-items:center;gap:10px;">
            ${esc(user.username)}
            ${isOwner ? `<button onclick="editProfile('username')" class="btn" style="background:none;border:none;color:var(--text-muted);cursor:pointer;" title="Đổi tên ${nameWait}">&#9998;</button>` : ''}
          </h2>
          <p>${isOwner ? 'Hồ sơ của bạn' : 'Tay đua cộng đồng'}</p>
          <div class="profile-stats">
            <div class="profile-stat"><div class="val">${videos.length}</div><div class="lbl">Số Record</div></div>
            <div class="profile-stat"><div class="val">${videos.reduce((a,v)=>a+(v.views||0),0)}</div><div class="lbl">Tổng lượt xem</div></div>
            ${videos.length?`<div class="profile-stat"><div class="val record-time" style="font-size:1.4rem">${fmtMs(Math.min(...videos.map(v=>v.record_ms)))}</div><div class="lbl">Thành tích tốt nhất</div></div>`:''}
          </div>
        </div>
      </div>
      <div class="section-header" style="margin-top:20px;"><h2>Tất Cả Record</h2></div>
      <div class="video-grid">
        ${videos.length ? videos.map(videoCard).join('') : '<div class="empty">Người này chưa tải lên record nào.</div>'}
      </div>
    </div>`;
  } catch(e) { console.error(e); $('app').innerHTML='<div class="empty" style="color:var(--red)">Không tìm thấy hồ sơ người dùng.</div>'; }
}

// ── ADMIN ─────────────────────────────────────────────
async function renderAdmin() {
  if(!currentUser||currentUser.role!=='ADMIN'){ toast('Bạn không có quyền truy cập trang này!','error'); navigate('/'); return; }
  let tab='maps';

  async function renderTab() {
    const [maps,cars,pets,users]=await Promise.all([apiFetch('/maps'),apiFetch('/cars'),apiFetch('/pets'),apiFetch('/users')]);
    $('app').innerHTML=`<div class="animate-in" style="display:flex;flex-direction:column;gap:20px;">
      <div><h1 style="font-size:1.7rem;font-weight:800">&#128736; Bảng Quản Trị</h1><p style="color:var(--text-muted);font-size:0.85rem">Quản lý dữ liệu hệ thống.</p></div>
      <div><div class="tabs">
        <button class="tab-btn${tab==='maps'?' active':''}" onclick="adminTab('maps')">Bản đồ (${maps.length})</button>
        <button class="tab-btn${tab==='cars'?' active':''}" onclick="adminTab('cars')">Siêu xe (${cars.length})</button>
        <button class="tab-btn${tab==='pets'?' active':''}" onclick="adminTab('pets')">Pets (${pets.length})</button>
        <button class="tab-btn${tab==='users'?' active':''}" onclick="adminTab('users')">Tài khoản (${users.length})</button>
      </div></div>

      ${tab==='maps'?`
        <div class="card"><div class="card-body">
          <div style="font-size:0.85rem;font-weight:700;margin-bottom:10px">Thêm Bản đồ mới</div>
          <div class="admin-add-form">
            <div class="form-group"><label class="form-label">Tên bản đồ *</label><input class="form-input" id="mn" placeholder="Tên bản đồ"/></div>
            <div class="form-group" style="max-width:90px"><label class="form-label">Độ khó (sao)</label><input class="form-input" id="md" type="number" min="1" max="10" value="1"/></div>
            <button class="btn btn-primary btn-sm" onclick="adminAdd('map')">+ Thêm</button>
          </div>
        </div></div>
        <div class="card" style="overflow:hidden"><table class="data-table"><thead><tr><th>Tên</th><th>Độ khó</th><th>Mã ID</th></tr></thead>
        <tbody>${maps.map(m=>`<tr><td style="font-weight:600">${esc(m.name)}</td><td><span style="color:var(--yellow)">${'★'.repeat(m.difficulty||1)}</span></td><td style="font-family:monospace;font-size:0.7rem;color:var(--text-dim)">${m.id}</td></tr>`).join('')}</tbody>
        </table></div>`:
      tab==='cars'?`
        <div class="card"><div class="card-body">
          <div style="font-size:0.85rem;font-weight:700;margin-bottom:10px">Thêm Siêu xe mới</div>
          <div class="admin-add-form">
            <div class="form-group"><label class="form-label">Tên xe *</label><input class="form-input" id="cn" placeholder="Tên xe"/></div>
            <div class="form-group" style="max-width:90px"><label class="form-label">Phân khúc</label><input class="form-input" id="cc" placeholder="S, A..."/></div>
            <button class="btn btn-sm" style="background:var(--orange);color:#fff" onclick="adminAdd('car')">+ Thêm</button>
          </div>
        </div></div>
        <div class="card" style="overflow:hidden"><table class="data-table"><thead><tr><th>Tên</th><th>Phân khúc</th><th>Mã ID</th></tr></thead>
        <tbody>${cars.map(c=>`<tr><td style="font-weight:600">${esc(c.name)}</td><td><span class="badge badge-orange">${esc(c.car_class||'?')}</span></td><td style="font-family:monospace;font-size:0.7rem;color:var(--text-dim)">${c.id}</td></tr>`).join('')}</tbody>
        </table></div>`:
      tab==='pets'?`<div class="card"><div class="card-body">
          <div style="font-size:0.85rem;font-weight:700;margin-bottom:10px">Thêm Pet mới</div>
          <div class="admin-add-form">
            <div class="form-group"><label class="form-label">Tên Pet *</label><input class="form-input" id="pn" placeholder="Tên Pet"/></div>
            <button class="btn btn-sm" style="background:var(--purple);color:#fff" onclick="adminAdd('pet')">+ Thêm</button>
          </div>
        </div></div>
        <div class="card" style="overflow:hidden"><table class="data-table"><thead><tr><th>Tên</th><th>Mã ID</th></tr></thead>
        <tbody>${pets.map(p=>`<tr><td style="font-weight:600">${esc(p.name)}</td><td style="font-family:monospace;font-size:0.7rem;color:var(--text-dim)">${p.id}</td></tr>`).join('')}</tbody>
        </table></div>`:
      tab==='users'?`
        <div class="card" style="overflow:hidden"><table class="data-table"><thead><tr><th>Avatar</th><th>Tài khoản</th><th>Email</th><th>Quyền</th><th>Mã ID</th></tr></thead>
        <tbody>${users.map(u=>`<tr>
          <td>${u.avatar?`<img src="${esc(u.avatar)}" style="width:28px;height:28px;border-radius:50%;object-fit:cover"/>`:`<div class="avatar avatar-sm">${esc(u.username[0].toUpperCase())}</div>`}</td>
          <td style="font-weight:600">${esc(u.username)}</td>
          <td style="color:var(--text-dim)">${esc(u.email)}</td>
          <td><span class="badge ${u.role==='ADMIN'?'badge-red':'badge-blue'}">${esc(u.role)}</span></td>
          <td style="font-family:monospace;font-size:0.7rem;color:var(--text-dim)">${u.id}</td>
        </tr>`).join('')}</tbody>
        </table></div>`:''}
    </div>`;
  }

  window.adminTab=(t)=>{ tab=t; renderTab(); };
  window.adminAdd=async(type)=>{
    try {
      if(type==='map'){
        const n=$('mn').value; if(!n){toast('Vui lòng nhập tên','error');return;}
        await apiFetch('/admin/maps',{method:'POST',body:JSON.stringify({name:n, difficulty: parseInt($('md').value||1)})});
      } else if(type==='car'){
        const n=$('cn').value; if(!n){toast('Vui lòng nhập tên','error');return;}
        await apiFetch('/admin/cars',{method:'POST',body:JSON.stringify({name:n,car_class:$('cc').value||'A'})});
      } else {
        const n=$('pn').value; if(!n){toast('Vui lòng nhập tên','error');return;}
        await apiFetch('/admin/pets',{method:'POST',body:JSON.stringify({name:n})});
      }
      toast('Đã thêm thành công!'); renderTab();
    } catch(e){ toast(e.message,'error'); }
  };

  renderTab();
}

// ─── ROUTER ──────────────────────────────────────────
async function router() {
  const hash=window.location.hash.slice(1)||'/';
  const parts=hash.split('/').filter(Boolean);
  // Update active nav links
  document.querySelectorAll('[data-route]').forEach(l=>l.classList.toggle('active',l.dataset.route===hash||(l.dataset.route==='/'&&hash==='/')));

  if(hash==='/'||hash==='') return renderHome();
  if(hash==='/login') return renderLogin();
  if(hash==='/register') return renderRegister();
  if(hash==='/upload') return renderUpload();
  if(hash==='/board') return renderBoard();
  if(hash==='/admin') return renderAdmin();
  if(parts[0]==='video'&&parts[1]) return renderVideo(parts[1]);
  if(parts[0]==='profile'&&parts[1]) return renderProfile(parts[1]);
  $('app').innerHTML='<div class="empty"><div class="empty-icon">&#128270;</div><p>Không tìm thấy trang.</p><a href="#/" style="color:var(--purple-light);margin-top:8px;display:inline-block">Về trang chủ &rarr;</a></div>';
}

window.addEventListener('hashchange', router);
window.doDelete=doDelete;
window.loadBoard=loadBoard;
window.confirmDelete=confirmDelete;

// ─── INIT ─────────────────────────────────────────────
(async()=>{ await fetchUser(); renderNav(); router(); })();
</script>
</body>
