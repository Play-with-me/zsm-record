<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TNX Record - Tenvyx Clan ZingSpeed Mobile</title>
  <meta name="description" content="Kho lưu trữ và bảng xếp hạng kỷ lục tốc độ của Tenvyx Clan (TNX) - ZingSpeed Mobile." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://res.cloudinary.com" />
  <link rel="dns-prefetch" href="https://zsm-record-backend.onrender.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #090a0f;
      --bg-card: rgba(20, 22, 30, 0.85);
      --bg-input: rgba(10, 12, 18, 0.8);
      --border: rgba(255,255,255,0.06);
      --border-active: #d4af37;
      --text: #f8f9fa;
      --text-muted: #9ca3af;
      --text-dim: #6b7280;
      --blue: #1d4ed8;
      --blue-hover: #2563eb;
      --purple: #1e1b4b;
      --purple-light: #4c1d95;
      --green: #10b981;
      --red: #be123c;
      --red-light: #f43f5e;
      --red-glow: rgba(190, 18, 60, 0.4);
      --orange: #f59e0b;
      --yellow: #fbbf24;
      --gold: #d4af37;
      --gold-glow: rgba(212, 175, 55, 0.4);
      --radius: 0px;
      --radius-lg: 0px;
      --transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      /* Refined Esports Neon */
      --neon-cyan: #38bdf8;
      --neon-pink: #e11d48;
      --neon-blue: #2563eb;
      --neon-purple: #d4af37;
      --neon-glow-cyan: 0 0 15px rgba(56, 189, 248, 0.25);
      --neon-glow-pink: 0 0 15px rgba(225, 29, 72, 0.25);
      --neon-glow-purple: 0 0 15px rgba(212, 175, 55, 0.25);
    }
    body { font-family:'Inter',system-ui,sans-serif; background:var(--bg); color:var(--text); min-height:100vh; -webkit-font-smoothing:antialiased; }
    a { color:inherit; text-decoration:none; }
    button { cursor:pointer; font-family:inherit; }
    input,textarea,select { font-family:inherit; }

    /* Esports Grid BG */
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background: radial-gradient(ellipse 80% 80% at 50% -20%, rgba(190, 18, 60, 0.15) 0%, transparent 60%);
    }
    body::after {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
      -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%);
    }
    #app, .navbar { position:relative; z-index:1; }

    .speed-streaks, .speed-streak, .speed-particle, .speed-bg, .cyberpunk-bg, .cyberpunk-grid, .glow-orb { display: none !important; }
    /* ── Animated speed streaks ────────────────────── */
    @keyframes speedStreak {
      0% { transform: translate3d(-120%,0,0) scaleX(0.3); opacity:0; }
      10% { opacity:1; }
      90% { opacity:1; }
      100% { transform: translate3d(120vw,0,0) scaleX(1); opacity:0; }
    }
    .speed-streaks { position:fixed; inset:0; pointer-events:none; z-index:0; overflow:hidden; contain:layout paint; transform:translateZ(0); }
    .speed-streak {
      position:absolute; height:1px; border-radius:2px;
      background:linear-gradient(90deg, transparent, rgba(220,38,38,0.35), rgba(255,120,120,0.5), transparent);
      animation:speedStreak var(--dur) linear var(--delay) infinite;
      will-change:transform, opacity;
    }
    .speed-streak:nth-child(odd) {
      background:linear-gradient(90deg, transparent, rgba(255,255,255,0.08), rgba(255,200,200,0.12), transparent);
    }
    .speed-streak:nth-child(3n) { height:2px; }
    .speed-streak:nth-child(n+7), .speed-particle { display:none; }

    /* Floating particles */
    @keyframes floatParticle {
      0% { transform: translateY(0) translateX(0); opacity:0; }
      20% { opacity:1; }
      80% { opacity:1; }
      100% { transform: translateY(-100vh) translateX(50px); opacity:0; }
    }
    .speed-particle {
      position:absolute; width:2px; height:2px; border-radius:50%;
      background:rgba(220,38,38,0.4); box-shadow:0 0 4px rgba(220,38,38,0.3);
      animation:floatParticle var(--dur) ease-in-out var(--delay) infinite;
    }

        /* Animations */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes slideInLeft { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
    .animate-up { animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.2s; }
    .delay-3 { animation-delay: 0.3s; }
    .card-hover { transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: var(--neon-glow-purple); border-color: var(--neon-purple); }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:3px; }

    /* ANIMATIONS */
    @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    @keyframes slideDown { from { opacity:0; transform:scaleY(0.9) translateY(-4px); } to { opacity:1; transform:scaleY(1) translateY(0); } }
    @keyframes spin { to { transform:rotate(360deg); } }
    @keyframes shimmer { 0% { background-position:-200% 0; } 100% { background-position:200% 0; } }
    
    @keyframes floatUp { 0% { opacity:1; transform:translateY(0) scale(1); } 100% { opacity:0; transform:translateY(-30px) scale(1.5); } }
    .floating-plus-one { position:absolute; color:var(--neon-pink); font-weight:bold; font-size:1.2rem; text-shadow:var(--neon-glow-pink); animation:floatUp 0.8s ease-out forwards; pointer-events:none; }
    
    @keyframes glitch-anim {
      0% { clip-path: inset(10% 0 30% 0); transform: translate(-2px, 1px); }
      20% { clip-path: inset(80% 0 5% 0); transform: translate(2px, -1px); }
      40% { clip-path: inset(40% 0 60% 0); transform: translate(-2px, 2px); }
      60% { clip-path: inset(20% 0 10% 0); transform: translate(2px, -2px); }
      80% { clip-path: inset(60% 0 40% 0); transform: translate(-1px, 1px); }
      100% { clip-path: inset(30% 0 20% 0); transform: translate(1px, -1px); }
    }
    .glitch { position:relative; display:inline-block; }
    .glitch:hover::before {
      content: attr(data-text); position:absolute; left:-2px; text-shadow:1px 0 var(--neon-cyan);
      top:0; color:var(--text); background:var(--bg); overflow:hidden; animation:glitch-anim 0.3s infinite linear alternate-reverse;
    }
    
    /* BACKGROUND SPEED THEME */
    .speed-bg { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-2; background:var(--bg); overflow:hidden; }
    .speed-line {
      position:absolute; width:2px; height:200px;
      background:linear-gradient(to bottom, transparent, var(--neon-cyan), transparent);
      animation: speedLineDrop linear infinite;
      will-change: transform;
      opacity: 0.15;
    }
    .speed-line:nth-child(even) { background:linear-gradient(to bottom, transparent, var(--neon-purple), transparent); }
    .speed-line:nth-child(3n) { background:linear-gradient(to bottom, transparent, var(--neon-pink), transparent); width:1px; }
    
    @keyframes speedLineDrop {
      0% { transform: translateY(-100vh); }
      100% { transform: translateY(100vh); }
    }
    
    .animate-in { animation:fadeUp 0.45s ease-out; }
    
    /* BACKGROUND */
    .cyberpunk-bg { position:fixed; top:0; left:0; width:100vw; height:100vh; z-index:-2; background:var(--bg); overflow:hidden; }
    @keyframes moveGrid { from { transform:perspective(500px) rotateX(60deg) translateY(0) translateZ(-200px); } to { transform:perspective(500px) rotateX(60deg) translateY(40px) translateZ(-200px); } }
    .cyberpunk-grid { position:absolute; top:-50%; left:-50%; width:200%; height:200%; background-image:linear-gradient(rgba(0,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,255,0.05) 1px, transparent 1px); background-size:40px 40px; transform:perspective(500px) rotateX(60deg) translateY(-100px) translateZ(-200px); animation:moveGrid 5s linear infinite; }
    .glow-orb { position:absolute; width:400px; height:400px; border-radius:50%; filter:blur(40px); opacity:0.2; z-index:-1; animation:floatOrb 10s ease-in-out infinite alternate; }
    .glow-orb.cyan { background:var(--neon-cyan); top:-100px; left:-100px; }
    .glow-orb.purple { background:var(--neon-purple); bottom:-100px; right:-100px; animation-delay:-5s; }
    @keyframes floatOrb { 0% { transform:translate(0, 0); } 100% { transform:translate(50px, 50px); } }
    
    /* BRACKET FRAME */
    .bracket-frame { position:relative; display:inline-block; padding:4px; }
    .bracket-frame::before, .bracket-frame::after { content:''; position:absolute; width:20px; height:20px; border:2px solid var(--neon-cyan); transition:var(--transition); z-index:1; }
    .bracket-frame::before { top:0; left:0; border-right:none; border-bottom:none; }
    .bracket-frame::after { bottom:0; right:0; border-left:none; border-top:none; }
    .bracket-frame:hover::before { width:100%; height:100%; border-color:var(--neon-purple); box-shadow:inset 0 0 10px var(--neon-glow-purple); }
    .bracket-frame:hover::after { width:100%; height:100%; border-color:var(--neon-purple); }
    
    /* QUICK VIEW MODAL */
    .quick-view-overlay {
      position:fixed; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px);
      display:flex; align-items:center; justify-content:center;
      z-index:9999; opacity:0; pointer-events:none; transition:opacity 0.2s ease;
    }.quick-view-overlay.active { opacity:1; pointer-events:auto; }
    .btn-close-modal:hover { color:var(--neon-pink); text-shadow:var(--neon-glow-pink); }


    /* SIDEBAR */
    .navbar { position:fixed; top:0; left:0; bottom:0; width:260px; z-index:100; background:rgba(8,9,14,0.85); backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px); border-right:1px solid rgba(255,255,255,0.05); box-shadow:5px 0 30px rgba(0,0,0,0.4); display:flex; flex-direction:column; }
    .navbar-inner { display:flex; flex-direction:column; padding:30px 0 20px; height:100%; gap:10px; }
    .logo { font-size:1.5rem; font-weight:900; letter-spacing:-0.04em; display:flex; flex-direction:column; align-items:center; gap:8px; text-align:center; color:var(--red); font-family:'Rajdhani', sans-serif; text-transform:uppercase; text-shadow: 0 0 10px rgba(220,38,38,0.3); transition: transform 0.3s ease; padding:0 20px 20px; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.05); }
    .logo img { width: 64px !important; height: 64px !important; }
    .logo:hover { transform: scale(1.05); }
    .nav-search { width:calc(100% - 24px); margin:0 auto 10px; display:flex; align-items:center; background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:8px; padding:8px 12px; transition:var(--transition); flex-shrink:0; }
    .nav-search:focus-within { border-color:var(--neon-cyan); box-shadow:var(--neon-glow-cyan); }
    .nav-search input { background:transparent; border:none; color:var(--text); font-size:0.85rem; outline:none; padding:4px; width:150px; }
    .nav-search input::placeholder { color:var(--text-dim); }
    .nav-links { display:flex; flex-direction:column; gap:4px; flex:1; padding:0 12px; overflow-y:auto; overflow-x:hidden; }
    .nav-link { 
      font-weight:700; color:var(--text-muted); text-decoration:none; padding:12px 16px; 
      display:flex; align-items:center; justify-content:flex-start; gap:14px; position:relative; transition:all 0.3s ease; 
      font-family:'Rajdhani', sans-serif; font-size:1.05rem; letter-spacing:0.03em;
      border-radius:6px; background:transparent; border-left:3px solid transparent;
    }
    .nav-link:hover { 
      color:var(--text); background:linear-gradient(90deg, rgba(255,255,255,0.05) 0%, transparent 100%); 
      border-left:3px solid rgba(255,255,255,0.2); transform:translateX(4px);
    }
    .nav-link.active { 
      color:var(--gold) !important; background:linear-gradient(90deg, rgba(212,175,55,0.1) 0%, transparent 100%); 
      border-left:3px solid var(--gold); text-shadow:0 0 8px rgba(212,175,55,0.4);
    }
    .nav-link svg { width:18px; height:18px; opacity:0.8; transition:all 0.3s ease; }
    .nav-link:hover svg { opacity:1; transform:scale(1.1); }
    .nav-link.active svg { opacity:1; filter:drop-shadow(0 0 5px rgba(212,175,55,0.5)); }
    .nav-link.admin-link { color:var(--orange); }

    .nav-search svg { width:15px; height:15px; color:var(--text-dim); flex-shrink:0; }
    .nav-search input {
      border:none; background:transparent; color:var(--text); font-size:0.85rem;
      width:100%; outline:none; padding:8px 0;
    }
    .nav-search input::placeholder { color:var(--text-dim); }
    #nav-auth { display:flex; flex-direction:column; align-items:stretch; gap:10px; width:100%; padding:0 12px; flex-shrink:0; margin-top:auto; }

    /* USER DROPDOWN */
    .user-menu { position:relative; }
    .user-trigger {
      display:flex; align-items:center; justify-content:flex-start; gap:10px; width:100%; 
      padding:8px 12px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); 
      background:rgba(255,255,255,0.03); color:var(--text); cursor:pointer; transition:all 0.3s ease;
    }
    .user-trigger:hover { background:rgba(255,255,255,0.08); border-color:rgba(255,255,255,0.15); }
    .user-trigger .uname { font-size:0.9rem; font-weight:600; color:#fff; text-overflow:ellipsis; overflow:hidden; white-space:nowrap; max-width:80px; }
    .user-dropdown {
      position:absolute; bottom:0; left:calc(100% + 15px); right:auto; top:auto; width:220px;
      background:rgba(15,16,22,0.95); backdrop-filter:blur(10px); border:1px solid rgba(255,255,255,0.1); border-radius:12px;
      box-shadow:0 10px 40px rgba(0,0,0,0.6); overflow:hidden;
      animation:slideRight 0.15s ease-out; z-index:200;
    }
    @keyframes slideRight { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
    .user-dropdown .dd-item {
      display:flex; align-items:center; gap:10px; padding:10px 14px;
      font-size:0.85rem; color:var(--text-muted); transition:var(--transition);
      cursor:pointer; border:none; background:transparent; width:100%; text-align:left;
    }
    .user-dropdown .dd-item:hover { background:rgba(255,255,255,0.05); color:var(--text); }
    .user-dropdown .dd-item.danger:hover { color:var(--red); background:rgba(248,113,113,0.08); }
    .user-dropdown .dd-sep { height:1px; background:var(--border); margin:4px 0; }

    /* BUTTONS */
    .btn {
      display:inline-flex; align-items:center; justify-content:center; gap:7px;
      padding:10px 22px; font-size:0.85rem; font-weight:700; text-transform:uppercase; letter-spacing:0.05em;
      border:none; transition:var(--transition); white-space:nowrap; cursor:pointer;
      clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px);
    }
    .btn-primary { background:var(--blue); color:#fff; }
    .btn-primary:hover { background:var(--blue-hover); transform:translateY(-1px); box-shadow: var(--neon-glow-cyan); }
    .btn-outline { background:transparent; color:var(--text-muted); border:1px solid var(--border); }
    .btn-outline:hover { background:rgba(255,255,255,0.05); color:var(--text); box-shadow: 0 0 10px rgba(255,255,255,0.2); }
    .btn-danger { background:rgba(248,113,113,0.1); color:var(--red); border:1px solid rgba(248,113,113,0.2); }
    .btn-danger:hover { background:rgba(248,113,113,0.2); box-shadow: 0 0 10px rgba(220,38,38,0.5); }
    .btn-purple { background:var(--purple); color:#fff; }
    .btn-purple:hover { background:var(--purple-light); transform:translateY(-1px); box-shadow: var(--neon-glow-purple); }
    .btn-sm { padding:6px 13px; font-size:0.8rem; clip-path: polygon(6px 0, 100% 0, 100% calc(100% - 6px), calc(100% - 6px) 100%, 0 100%, 0 6px); }
    .btn-icon { padding:7px; background:transparent; border:none; color:var(--text-muted); clip-path: none; }
    .btn-icon:hover { color:var(--blue); background:rgba(59,130,246,0.1); }
    .btn:disabled { opacity:0.45; cursor:not-allowed; transform:none !important; }

    /* AVATAR */
    .avatar {
      border-radius:50%; background:linear-gradient(135deg,var(--blue),var(--purple));
      display:flex; align-items:center; justify-content:center;
      font-weight:700; color:#fff; flex-shrink:0; overflow:hidden;
    }
    .avatar-sm { width:28px; height:28px; font-size:0.7rem; }
    .avatar-md { width:36px; height:36px; font-size:0.85rem; }
    .avatar-lg { width:64px; height:64px; font-size:1.4rem; }
    .avatar img { width:100%; height:100%; object-fit:cover; }

    /* CONTAINER */
    .container { max-width:1200px; margin:0 auto; padding:28px 24px; }

    /* CARDS */
    .card {
      background:var(--bg-card); border:1px solid var(--border);
      transition:var(--transition);
      clip-path: polygon(0 0, 100% 0, 100% calc(100% - 15px), calc(100% - 15px) 100%, 0 100%);
    }
    .card-hover:hover { border-color:var(--gold); transform:translateY(-2px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
    .card-body { padding:20px; }
    .card-body-lg { padding:32px; }

    /* FORMS */
    .form-group { display:flex; flex-direction:column; gap:6px; }
    .form-label { font-size:0.8rem; font-weight:500; color:var(--text-muted); }
    .form-input {
      width:100%; padding:10px 13px; font-size:0.85rem;
      background:var(--bg-input); border:1px solid var(--border); color:var(--text);
      transition:var(--transition); outline:none;
      clip-path: polygon(8px 0, 100% 0, 100% calc(100% - 8px), calc(100% - 8px) 100%, 0 100%, 0 8px);
    }
    .form-input:focus { border-color:var(--purple); box-shadow:0 0 0 2px rgba(212,175,55,0.15); }
    .form-input::placeholder { color:var(--text-dim); }
    textarea.form-input { min-height:90px; resize:vertical; }

    /* COMBOBOX */
    .combobox { position:relative; }
    .combobox-trigger {
      display:flex; align-items:center; justify-content:space-between;
      width:100%; padding:10px 13px; border-radius:8px; font-size:0.85rem;
      background:var(--bg-input); border:1px solid var(--border); color:var(--text);
      cursor:pointer; transition:var(--transition); gap:8px;
    }
    .combobox-trigger:hover { border-color:rgba(255,255,255,0.15); }
    .combobox-trigger .placeholder { color:var(--text-dim); }
    .combobox-trigger.open { border-color:var(--purple); box-shadow:0 0 0 2px rgba(212,175,55,0.15); }
    .combobox-trigger svg { width:15px; height:15px; opacity:0.4; flex-shrink:0; }
    .combobox-trigger .selected-text { flex:1; text-align:left; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .combobox-dropdown {
      position:absolute; top:calc(100% + 4px); left:0; right:0; z-index:50;
      border-radius:10px; border:1px solid var(--border);
      background:#0a0a14; box-shadow:0 12px 40px rgba(0,0,0,0.6);
      animation:slideDown 0.12s ease-out; overflow:hidden;
    }
    .combobox-search { padding:8px; border-bottom:1px solid var(--border); }
    .combobox-search input {
      width:100%; padding:7px 11px; border-radius:7px; font-size:0.82rem;
      background:rgba(0,0,0,0.4); border:1px solid var(--border); color:var(--text); outline:none;
    }
    .combobox-search input:focus { border-color:var(--purple); }
    .combobox-list { max-height:200px; overflow-y:auto; padding:4px; }
    .combobox-item {
      display:flex; align-items:center; gap:8px; padding:8px 11px;
      border-radius:7px; font-size:0.83rem; cursor:pointer; transition:background 0.12s;
    }
    .combobox-item:hover { background:rgba(255,255,255,0.06); }
    .combobox-item.selected { background:rgba(212,175,55,0.12); color:var(--purple-light); }
    .combobox-check { width:15px; height:15px; opacity:0; flex-shrink:0; }
    .combobox-item.selected .combobox-check { opacity:1; }
    .combobox-empty { padding:20px; text-align:center; color:var(--text-dim); font-size:0.82rem; }
    .combobox-clear {
      display:flex; align-items:center; gap:8px; padding:7px 11px;
      border-radius:7px; font-size:0.82rem; cursor:pointer; width:100%;
      color:var(--text-dim); border:none; background:transparent; text-align:left;
      border-bottom:1px solid var(--border); margin-bottom:2px;
    }
    .combobox-clear:hover { color:var(--red); background:rgba(248,113,113,0.06); }
    .combobox-group-header {
      padding:4px 11px 2px;
      font-size:0.7rem; font-weight:700; letter-spacing:0.08em; text-transform:uppercase;
      color:var(--text-dim); background:rgba(255,255,255,0.03);
      border-bottom:1px solid var(--border); margin-top:4px;
    }

    /* TABLE */

    /* RANK */

    .video-card:hover { transform:translateY(-4px); box-shadow:0 10px 30px rgba(212, 175, 55, 0.25), 0 0 0 1px var(--neon-purple); border-color:var(--neon-purple); }
